<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCE-Agencia API</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0f172a; color: #e2e8f0; }
    .card { background: #1e293b; padding: 3rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.3); text-align: center; max-width: 480px; }
    .logo { width: 64px; height: 64px; background: #2563eb; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    h1 { margin: 0 0 .5rem; font-size: 1.75rem; }
    p { color: #94a3b8; margin: 0 0 .25rem; }
    .version { color: #64748b; font-size: .8rem; margin-bottom: 1.5rem; }
    .links { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
    a { padding: .6rem 1.25rem; background: #2563eb; color: white; text-decoration: none; border-radius: 8px; font-weight: 500; font-size: .9rem; }
    a:hover { background: #1d4ed8; }
    a.ghost { background: transparent; border: 1px solid #334155; color: #94a3b8; }
    a.ghost:hover { background: #334155; color: #e2e8f0; }
    .env-note { margin-top: 1.5rem; font-size: .75rem; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
      </svg>
    </div>
    <h1>PCE-Agencia</h1>
    <p>API del sistema de gestión de agencia de viajes</p>
    <p class="version">v2.0.0</p>
    <div class="links">
      <a href="/api/health">Health Check</a>
      <a href="/api" class="ghost">API Info</a>
    </div>
    <div class="env-note">
      Frontend: <code>http://localhost:5173</code> (dev) · mismo dominio (prod)
    </div>
  </div>
</body>
</html>
